$def with(contacto)

<h1>Borrar Contacto</h1>

<form method="POST">
  <label for="id_contacto">ID Contacto:</label>
  <input type="text" readonly id="id_contacto" name="id_contacto" value="$contacto['id_contacto']"><br><br>

  <label for="nombre">Nombre:</label>
  <input type="text" readonly id="nombre" name="nombre" value="$contacto['nombre']"><br><br>

  <label for="primer_apellido">Primer Apellido:</label>
  <input type="text" readonly id="primer_apellido" name="primer_apellido" value="$contacto['primer_apellido']"><br><br>

  <label for="segundo_apellido">Segundo Apellido:</label>
  <input type="text" readonly id="segundo_apellido" name="segundo_apellido" value="$contacto['segundo_apellido']"><br><br>

  <label for="email">Email:</label>
  <input type="email" readonly id="email" name="email" value="$contacto['email']"><br><br>

  <label for="telefono">Teléfono:</label>
  <input type="tel" readonly id="telefono" name="telefono" value="$contacto['telefono']"><br><br>

  <a href="/lista_contactos"><button type="button">Regresar</button></a>
  <button name="borrar" value="borrar">Borrar</button>
</form>
